<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Materials - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    body { padding-top: 70px; }
    .materials-container { padding: 2rem; max-width: 1000px; margin: 0 auto; }
    .material-card { padding: 1.5rem; border-radius: 12px; background-color: var(--bg-secondary); border: 1px solid var(--border-color); margin-bottom: 1.5rem; transition: var(--transition); }
    .material-card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-lg); }
    .material-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem; }
    .material-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .material-course { color: var(--text-light); font-size: 0.9rem; }
    .material-meta { display: flex; gap: 1.5rem; font-size: 0.85rem; color: var(--text-light); margin: 1rem 0; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 0.5rem; }
    .status-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
    .status-available { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .status-pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .material-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-box { padding: 1rem; border-radius: 8px; background-color: var(--bg-secondary); border: 1px solid var(--border-color); text-align: center; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.85rem; color: var(--text-light); margin-top: 0.5rem; }
    .empty-state { text-align: center; padding: 3rem 1rem; }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="materials-container">
    <div style="margin-bottom: 2rem;">
      <h1>📚 Study Materials</h1>
      <p style="color: var(--text-light);">Quality PDF guides and resources for your branch</p>
    </div>

    <!-- Statistics -->
    <div class="stats-grid" id="statsContainer">
      <!-- Populated by JavaScript -->
    </div>

    <!-- Filter by Course -->
    <div style="margin-bottom: 2rem;">
      <label style="display: block; margin-bottom: 1rem; font-weight: 600;">Filter by Course</label>
      <select id="courseFilter" class="form-select" style="max-width: 400px;">
        <option value="">All Materials</option>
      </select>
    </div>

    <!-- Materials List -->
    <div id="materialsContainer">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p style="color: var(--text-light);">No materials available yet</p>
        <p style="font-size: 0.9rem; color: var(--text-light);">Check back soon for study materials</p>
      </div>
    </div>

    <!-- Upload PDF Modal -->
    <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
      <h3>📤 Contribute Materials</h3>
      <p style="color: var(--text-light); margin-bottom: 1.5rem;">Admins can upload new study materials here</p>
      
      <div class="card" style="padding: 2rem;">
        <form id="pdfUploadForm" style="display: none;">
          <div class="mb-3">
            <label class="form-label">PDF File</label>
            <input type="file" class="form-control" id="pdfFile" accept=".pdf" required>
            <small class="form-text">Max 100 MB</small>
          </div>

          <div class="mb-3">
            <label class="form-label">Course Title</label>
            <input type="text" class="form-control" id="courseTitle" placeholder="e.g., Digital Electronics" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Material Title</label>
            <input type="text" class="form-control" id="materialTitle" placeholder="e.g., Binary Number System" required>
          </div>

          <button type="submit" class="btn btn-primary">Upload Material</button>
        </form>
        
        <button class="btn btn-primary" id="toggleUploadForm" style="display: none;">Enable Upload</button>
        <p style="font-size: 0.85rem; color: var(--text-light); margin-top: 1rem;">Admin access required to upload materials</p>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/data/mockData.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pdfManager.js"></script>
  <script src="assets/js/mailService.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadNavbar();
      loadFooter();
      renderMaterials();
      setupUploadForm();
    });

    function loadNavbar() {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.querySelector('#navbar-container').innerHTML = h);
    }

    function loadFooter() {
      fetch('components/footer.html')
        .then(r => r.text())
        .then(h => document.querySelector('#footer-container').innerHTML = h);
    }

    function renderMaterials() {
      const selectedBranch = localStorage.getItem('ecetx-selected-branch') || 'ece';
      const branchData = window.pdfManager.getMaterialsByBranch(selectedBranch);

      if (!branchData) {
        document.getElementById('materialsContainer').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🚫</div>
            <p style="color: var(--text-light);">Branch not found</p>
          </div>
        `;
        return;
      }

      // Render stats
      const stats = window.pdfManager.getStatistics(selectedBranch);
      document.getElementById('statsContainer').innerHTML = `
        <div class="stat-box">
          <div class="stat-value">${stats.total}</div>
          <div class="stat-label">Total Materials</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${stats.available}</div>
          <div class="stat-label">Available</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${stats.pending}</div>
          <div class="stat-label">Coming Soon</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${stats.totalPages}</div>
          <div class="stat-label">Total Pages</div>
        </div>
      `;

      // Populate course filter
      const courses = [...new Set(branchData.materials.map(m => m.course))];
      const courseSelect = document.getElementById('courseFilter');
      courseSelect.innerHTML = '<option value="">All Materials</option>' + 
        courses.map(course => `<option value="${course}">${course}</option>`).join('');

      // Render materials
      const container = document.getElementById('materialsContainer');
      const materials = branchData.materials;

      if (materials.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p style="color: var(--text-light);">No materials available yet</p>
            <p style="font-size: 0.9rem; color: var(--text-light);">We're adding quality materials soon!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = materials.map(material => `
        <div class="material-card">
          <div class="material-header">
            <div>
              <div class="material-title">📄 ${material.title}</div>
              <div class="material-course">${material.course}</div>
            </div>
            <span class="status-badge status-${material.status}">${material.status === 'available' ? '✓ Available' : '⏳ Coming Soon'}</span>
          </div>

          <div class="material-meta">
            <div class="meta-item">📖 Chapter ${material.chapter}</div>
            <div class="meta-item">📄 ${material.pages} pages</div>
            <div class="meta-item">💾 ${material.size}</div>
            <div class="meta-item">📅 ${new Date(material.uploadDate).toLocaleDateString()}</div>
          </div>

          <div class="material-actions">
            ${material.status === 'available' ? `
              <button class="btn btn-primary btn-sm" onclick="viewPDF('${material.id}')">👁️ View</button>
              <button class="btn btn-primary btn-sm" onclick="downloadPDF('${material.id}')">⬇️ Download</button>
            ` : `
              <button class="btn btn-secondary btn-sm" disabled>Coming Soon</button>
            `}
            <button class="btn btn-outline-primary btn-sm" onclick="shareMaterial('${material.id}')">📤 Share</button>
          </div>
        </div>
      `).join('');

      // Filter handler
      courseSelect.addEventListener('change', (e) => {
        const selected = e.target.value;
        const filtered = selected ? materials.filter(m => m.course === selected) : materials;
        
        container.innerHTML = filtered.length > 0 ? filtered.map(material => `
          <div class="material-card">
            <div class="material-header">
              <div>
                <div class="material-title">📄 ${material.title}</div>
                <div class="material-course">${material.course}</div>
              </div>
              <span class="status-badge status-${material.status}">${material.status === 'available' ? '✓ Available' : '⏳ Coming Soon'}</span>
            </div>

            <div class="material-meta">
              <div class="meta-item">📖 Chapter ${material.chapter}</div>
              <div class="meta-item">📄 ${material.pages} pages</div>
              <div class="meta-item">💾 ${material.size}</div>
              <div class="meta-item">📅 ${new Date(material.uploadDate).toLocaleDateString()}</div>
            </div>

            <div class="material-actions">
              ${material.status === 'available' ? `
                <button class="btn btn-primary btn-sm" onclick="viewPDF('${material.id}')">👁️ View</button>
                <button class="btn btn-primary btn-sm" onclick="downloadPDF('${material.id}')">⬇️ Download</button>
              ` : `
                <button class="btn btn-secondary btn-sm" disabled>Coming Soon</button>
              `}
              <button class="btn btn-outline-primary btn-sm" onclick="shareMaterial('${material.id}')">📤 Share</button>
            </div>
          </div>
        `).join('') : `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <p style="color: var(--text-light);">No materials found for this course</p>
          </div>
        `;
      });
    }

    function viewPDF(materialId) {
      // When PDFs are uploaded
      if (window.pdfManager.uploadedPDFs.find(p => p.id === materialId)) {
        window.pdfManager.viewPDF(materialId);
      } else {
        ToastManager?.warning('PDF will be available soon');
      }
    }

    function downloadPDF(materialId) {
      if (window.pdfManager.uploadedPDFs.find(p => p.id === materialId)) {
        window.pdfManager.downloadPDF(materialId);
      } else {
        ToastManager?.warning('PDF not yet uploaded');
      }
    }

    function shareMaterial(materialId) {
      const url = `${window.location.href}?material=${materialId}`;
      navigator.clipboard.writeText(url);
      ToastManager?.success('Link copied to clipboard!');
    }

    function setupUploadForm() {
      const uploadForm = document.getElementById('pdfUploadForm');
      const toggleBtn = document.getElementById('toggleUploadForm');

      // Check if admin
      const isAdmin = localStorage.getItem('admin-mode') === 'true';
      
      if (isAdmin) {
        uploadForm.style.display = 'block';
        toggleBtn.style.display = 'none';

        uploadForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const file = document.getElementById('pdfFile').files[0];
          if (!file) {
            ToastManager?.error('Please select a PDF file');
            return;
          }

          if (file.type !== 'application/pdf') {
            ToastManager?.error('Please select a PDF file');
            return;
          }

          const metadata = {
            course: document.getElementById('courseTitle').value,
            title: document.getElementById('materialTitle').value,
          };

          await window.pdfManager.uploadPDF(file, metadata);
          uploadForm.reset();
          renderMaterials();
        });
      } else {
        toggleBtn.style.display = 'block';
        uploadForm.style.display = 'none';
      }
    }
  </script>
</body>
</html>
