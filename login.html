<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    }
    .auth-container {
      width: 100%;
      max-width: 450px;
      padding: 2rem;
      background-color: var(--bg-light);
      border-radius: 16px;
      box-shadow: var(--card-shadow-xl);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .auth-header p {
      color: var(--text-light);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }
    .form-control {
      padding: 0.75rem 1rem;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-light);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="auth-container animate-fadeIn">
    <div class="auth-header">
      <h1>🎓 ECETX</h1>
      <p>Sign in to your account</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="••••••••" required>
      </div>

      <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" id="rememberMe">
        <label class="form-check-label" for="rememberMe">Remember me</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg">Sign In</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="register.html">Sign up here</a></p>
      <p><a href="forgot-password.html">Forgot your password?</a></p>
    </div>
  </div>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/formValidator.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = loginForm.querySelector('input[type="email"]').value.trim();
        const password = loginForm.querySelector('input[type="password"]').value;

        // Validate
        if (!email || !password) {
          ToastManager?.error('Please fill in all fields');
          return;
        }

        if (password.length < 6) {
          ToastManager?.error('Password must be at least 6 characters');
          return;
        }

        // Verify email
        const isValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        if (!isValidEmail) {
          ToastManager?.error('Please enter a valid email address');
          return;
        }

        // Simulate API call
        ToastManager?.info('Signing in...');
        
        setTimeout(() => {
          localStorage.setItem('user-email', email);
          localStorage.setItem('login-time', new Date().toISOString());
          ToastManager?.success('Login successful!');
          
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 500);
        }, 1500);
      });
    });
  </script>
</body>
</html>
