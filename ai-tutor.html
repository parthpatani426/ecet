<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tutor - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { padding-top: 70px; }
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 140px); }
    .messages { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
    .message { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .message.user { justify-content: flex-end; }
    .message-bubble { max-width: 70%; padding: 1rem; border-radius: 12px; }
    .user .message-bubble { background: var(--primary); color: white; }
    .ai .message-bubble { background: var(--bg-secondary); border: 1px solid var(--border-color); }
    .input-area { padding: 2rem; border-top: 1px solid var(--border-color); }
    .input-group { display: flex; gap: 1rem; }
    .input-group input { flex: 1; padding: 0.75rem 1rem; border-radius: 8px; }
    .input-group button { padding: 0.75rem 2rem; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="chat-container">
    <div class="messages" id="chatMessages">
      <div class="message ai">
        <div class="message-bubble">
          <div>👋 Hi! I'm your AI Tutor. How can I help you with your studies today?</div>
          <div style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7;">Ask me anything related to your courses</div>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-group">
        <input type="text" id="messageInput" placeholder="Ask your question..." class="form-control">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </main>

  <script src="assets/js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.getElementById('navbar-container').innerHTML = h);

      document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
    });

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      const messagesDiv = document.getElementById('chatMessages');
      
      // User message
      messagesDiv.innerHTML += `<div class="message user"><div class="message-bubble">${message}</div></div>`;
      input.value = '';
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      // AI response (simulated)
      setTimeout(() => {
        const responses = [
          'That\'s a great question! Let me explain...',
          'Good question! This topic covers...',
          'I can help you with that. The key concept is...',
          'Let me break this down for you...'
        ];
        const response = responses[Math.floor(Math.random() * responses.length)];
        messagesDiv.innerHTML += `<div class="message ai"><div class="message-bubble">${response}</div></div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }, 500);
    }
  </script>
</body>
</html>
