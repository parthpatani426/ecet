<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    body { padding-top: 70px; }
    .learn-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem; padding: 2rem; }
    .filter-section { background-color: var(--bg-secondary); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
    .filter-section h5 { margin-bottom: 1rem; font-weight: 700; }
    .filter-section label { display: block; margin-bottom: 0.5rem; }
    .course-card { padding: 1.5rem; border-radius: 12px; background-color: var(--bg-secondary); border: 1px solid var(--border-color); cursor: pointer; transition: var(--transition); margin-bottom: 1rem; }
    .course-card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-lg); }
    .course-image { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .course-title { font-weight: 700; margin-bottom: 0.5rem; }
    .course-meta { font-size: 0.85rem; color: var(--text-light); margin-bottom: 1rem; }
    .rating { color: var(--warning); font-weight: 700; }
    .badge-category { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
    @media (max-width: 1200px) { .learn-container { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 768px) { .learn-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div id="navbar-container"></div>

  <main style="padding: 2rem;">
    <div class="container-fluid">
      <div style="display: grid; grid-template-columns: 250px 1fr; gap: 2rem;">
        
        <!-- Sidebar Filters -->
        <div>
          <div class="filter-section">
            <h5>Filters</h5>
            <div>
              <h6 style="font-size: 0.9rem; margin-top: 1rem;">Difficulty</h6>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="beginner" checked>
                <label class="form-check-label" for="beginner">Beginner</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="intermediate" checked>
                <label class="form-check-label" for="intermediate">Intermediate</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="advanced" checked>
                <label class="form-check-label" for="advanced">Advanced</label>
              </div>
            </div>
            <div style="margin-top: 1rem;">
              <h6 style="font-size: 0.9rem; margin-top: 1rem;">Category</h6>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="core" checked>
                <label class="form-check-label" for="core">Core</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="elective">
                <label class="form-check-label" for="elective">Elective</label>
              </div>
            </div>
            <button class="btn btn-primary btn-sm w-100" style="margin-top: 1rem;">Apply Filters</button>
          </div>
        </div>

        <!-- Courses Grid -->
        <div>
          <div style="margin-bottom: 2rem;">
            <h1 style="margin-bottom: 0.5rem;">📚 Courses</h1>
            <p style="color: var(--text-light);">Discover and master courses in your field</p>
          </div>

          <div class="learn-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; padding: 0;">
            <!-- Populated by JavaScript -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/data/mockData.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadNavbar();
      loadFooter();
      renderCourses();
    });

    function loadNavbar() {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.querySelector('#navbar-container').innerHTML = h);
    }

    function loadFooter() {
      fetch('components/footer.html')
        .then(r => r.text())
        .then(h => document.querySelector('#footer-container').innerHTML = h);
    }

    function renderCourses() {
      const container = document.querySelector('.learn-container');
      const selectedBranch = localStorage.getItem('ecetx-selected-branch') || 'ece';
      const courses = mockData.courses.filter(c => c.branch === selectedBranch);

      container.innerHTML = courses.map(course => `
        <div class="course-card">
          <div class="course-image">${course.image}</div>
          <div class="course-title">${course.title}</div>
          <div class="course-meta">
            <span class="badge badge-category">${course.level}</span>
          </div>
          <div style="margin-bottom: 1rem;">
            <div style="font-size: 0.9rem;">⭐ <span class="rating">${course.rating}</span> (${course.students} students)</div>
          </div>
          <div style="margin-bottom: 1rem;">
            <div style="font-size: 0.85rem; color: var(--text-light);">${course.chapters} chapters • ${course.duration}</div>
          </div>
          <div style="display: flex; gap: 0.5rem;">
            <a href="#" class="btn btn-primary btn-sm" style="flex: 1;">Enroll</a>
            <a href="#" class="btn btn-outline-primary btn-sm" style="flex: 1;">Info</a>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
