<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    }
    .auth-container {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      background-color: var(--bg-light);
      border-radius: 16px;
      box-shadow: var(--card-shadow-xl);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .auth-header p {
      color: var(--text-light);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }
    .form-control {
      padding: 0.75rem 1rem;
    }
    .otp-input {
      font-size: 1.5rem;
      text-align: center;
      letter-spacing: 0.5rem;
      font-weight: 700;
      font-family: monospace;
    }
    .password-strength {
      height: 6px;
      border-radius: 3px;
      margin-top: 0.5rem;
      background-color: #e0e0e0;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      transition: width 0.3s, background-color 0.3s;
      width: 0%;
      background-color: #ef4444;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-light);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="auth-container animate-fadeIn">
    <div class="auth-header">
      <h1>🔐 Reset Password</h1>
      <p>Enter the code and your new password</p>
    </div>

    <form id="resetForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="emailInput" readonly>
      </div>

      <div class="form-group">
        <label class="form-label">Reset Code</label>
        <input type="text" class="form-control otp-input" id="otpInput" placeholder="000000" maxlength="6" inputmode="numeric" required>
        <small class="text-muted">Enter the 6-digit code from your email</small>
      </div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control" id="passwordInput" placeholder="••••••••" required>
        <div class="password-strength">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <small class="text-muted d-block mt-1">
          Password must be at least 8 characters
        </small>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmInput" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg">🔐 Reset Password</button>
    </form>

    <div class="auth-footer">
      <p><a href="login.html">Back to Login</a></p>
    </div>
  </div>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const resetForm = document.getElementById('resetForm');
      const emailInput = document.getElementById('emailInput');
      const otpInput = document.getElementById('otpInput');
      const passwordInput = document.getElementById('passwordInput');
      const confirmInput = document.getElementById('confirmInput');
      const strengthBar = document.getElementById('strengthBar');

      // Get email from session storage
      const email = sessionStorage.getItem('reset_email');
      if (!email) {
        ToastManager?.error('❌ No email found. Please start password reset again.');
        setTimeout(() => {
          window.location.href = 'forgot-password.html';
        }, 1500);
        return;
      }

      emailInput.value = email;

      // Format OTP input - only accept digits
      otpInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
      });

      // Password strength indicator
      passwordInput.addEventListener('input', (e) => {
        const password = e.target.value;
        let strength = 0;

        if (password.length >= 8) strength++;
        if (/[a-z]/.test(password)) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;

        const percentage = (strength / 5) * 100;
        strengthBar.style.width = percentage + '%';

        if (strength <= 2) {
          strengthBar.style.backgroundColor = '#ef4444';
        } else if (strength <= 3) {
          strengthBar.style.backgroundColor = '#f59e0b';
        } else if (strength <= 4) {
          strengthBar.style.backgroundColor = '#10b981';
        } else {
          strengthBar.style.backgroundColor = '#0ea5e9';
        }
      });

      // Reset form submission
      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const code = otpInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmInput.value;

        // Validation
        if (!code || code.length !== 6) {
          ToastManager?.error('❌ Please enter a valid 6-digit code');
          return;
        }

        if (!password || password.length < 8) {
          ToastManager?.error('❌ Password must be at least 8 characters');
          return;
        }

        if (password !== confirmPassword) {
          ToastManager?.error('❌ Passwords do not match');
          return;
        }

        const submitBtn = resetForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Resetting...';

        try {
          await window.apiClient.resetPassword(email, code, password);
          ToastManager?.success('✅ Password reset successfully!');
          
          // Clear session storage
          sessionStorage.removeItem('reset_email');
          sessionStorage.removeItem('reset_branch');
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } catch (error) {
          console.error('❌ Reset error:', error);
          ToastManager?.error(`❌ ${error.message}`);
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
    });
  </script>
</body>
</html>
