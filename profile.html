<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    body { padding-top: 70px; }
    .profile-header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 3rem 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .profile-avatar { font-size: 4rem; margin-bottom: 1rem; }
    .profile-name { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .profile-email { opacity: 0.9; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { padding: 1.5rem; border-radius: 12px; background-color: var(--bg-secondary); border: 1px solid var(--border-color); text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); margin-bottom: 0.5rem; }
    .stat-label { color: var(--text-light); font-size: 0.9rem; }
    .badges-section { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; }
    .badge-item { padding: 1.5rem; border-radius: 12px; background-color: var(--bg-secondary); border: 2px solid var(--border-color); text-align: center; transition: var(--transition); }
    .badge-item:hover { border-color: var(--primary); transform: scale(1.05); }
    .badge-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .badge-name { font-weight: 600; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main style="padding: 2rem;">
    <div class="container-fluid" style="max-width: 1000px;">
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-avatar">👨‍🎓</div>
        <div class="profile-name" id="profileName">Loading...</div>
        <div class="profile-email" id="profileEmail">user@email.com</div>
        <div style="margin-top: 1rem; display: flex; gap: 1rem;">
          <button class="btn btn-light btn-sm">Edit Profile</button>
          <button class="btn btn-outline-light btn-sm">Change Password</button>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">6,540</div>
          <div class="stat-label">Total Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">#234</div>
          <div class="stat-label">Global Rank</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">156</div>
          <div class="stat-label">Study Hours</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">78.5%</div>
          <div class="stat-label">Test Accuracy</div>
        </div>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs" role="tablist" style="margin-bottom: 2rem;">
        <li class="nav-item">
          <a class="nav-link active" id="badges-tab" data-bs-toggle="tab" href="#badges" role="tab">Badges & Achievements</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="courses-tab" data-bs-toggle="tab" href="#courses" role="tab">Courses</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="activity-tab" data-bs-toggle="tab" href="#activity" role="tab">Activity</a>
        </li>
      </ul>

      <!-- Tab Content -->
      <div class="tab-content">
        <div class="tab-pane fade show active" id="badges" role="tabpanel">
          <div class="badges-section" id="badgesContainer">
            <!-- Populated by JavaScript -->
          </div>
        </div>
        <div class="tab-pane fade" id="courses" role="tabpanel">
          <p>Courses enrolled: 6 | Completed: 2</p>
        </div>
        <div class="tab-pane fade" id="activity" role="tabpanel">
          <p>Recent Activity</p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/data/mockData.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.querySelector('#navbar-container').innerHTML = h);
      fetch('components/footer.html')
        .then(r => r.text())
        .then(h => document.querySelector('#footer-container').innerHTML = h);
      
      const profile = mockData.userProfile;
      document.getElementById('profileName').textContent = profile.name;
      document.getElementById('profileEmail').textContent = profile.email;
      
      const badgesContainer = document.getElementById('badgesContainer');
      badgesContainer.innerHTML = profile.badges.map(badge => `
        <div class="badge-item">
          <div class="badge-icon">${badge.icon}</div>
          <div class="badge-name">${badge.name}</div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
