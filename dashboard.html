<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    body { padding-top: 70px; }
    .dashboard-container { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; padding: 2rem; }
    .dashboard-main { flex: 1; }
    .dashboard-header { margin-bottom: 1.5rem; }
    .dashboard-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }

    .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; margin-top: 1.8rem; }

    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .module-card {
      padding: 1.25rem;
      border-radius: 12px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      cursor: default;
    }
    .module-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.25rem; }
    .module-sub { color: var(--text-light); font-size: 0.88rem; margin-bottom: 0.5rem; }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 992px) {
      .dashboard-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div id="navbar-container"></div>

  <!-- Sidebar -->
  <div id="sidebar-container" style="display: none;"></div>

  <main class="dashboard-main">
    <div class="dashboard-container">
      <div style="flex: 1;">
        <div class="dashboard-header">
          <h1>Welcome Back! 👋</h1>
          <p class="text-muted">Continue your learning journey</p>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
          <a href="learn.html" class="btn btn-primary">📚 Learn</a>
          <a href="practice.html" class="btn btn-primary">✏️ Practice</a>
          <a href="mock-tests.html" class="btn btn-primary">📝 Tests</a>
          <a href="#" class="btn btn-warning" data-branch-guru>🤖 Branch Guru</a>
        </div>

        <!-- Branch Modules (dynamic) -->
        <div class="section-title">📚 Your Branch Modules</div>
        <div class="modules-grid" id="modulesContainer">
          <div class="module-card">Loading your modules…</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/auth-manager.js"></script>
  <script src="assets/js/branch-guru.js"></script>

  <script>
    // Branch -> modules mapping (no user progress/statistics; content derives from branch)
    const BRANCH_MODULES = {
      "cme": ["CME Progress", "CME Practice", "CME Mock Tests", "CME Previous Papers", "CME Guru"],
      "ece": ["ECE Progress", "ECE Practice", "ECE Mock Tests", "ECE Previous Papers", "ECE Guru"],
      "eee": ["EEE Progress", "EEE Practice", "EEE Mock Tests", "EEE Previous Papers", "EEE Guru"],
      "civil": ["Civil Progress", "Civil Practice", "Civil Mock Tests", "Civil Previous Papers", "Civil Guru"],
      "mechanical": ["Mechanical Progress", "Mechanical Practice", "Mechanical Mock Tests", "Mechanical Previous Papers", "Mechanical Guru"]
    };

    document.addEventListener('DOMContentLoaded', () => {
      loadNavbar();
      loadFooter();
      loadModules();
    });

    async function loadModules() {
      const container = document.getElementById('modulesContainer');
      try {
        const profile = await window.apiClient.getProfile();
        const branchInfo = await window.apiClient.getBranchInfo();

        const branch = (branchInfo?.branch || profile?.branch || '').toLowerCase();
        const modules = BRANCH_MODULES[branch] || [];

        if (!modules.length) {
          container.innerHTML = `<div class="module-card">No modules configured for branch: ${escapeHtml(branch)}</div>`;
          return;
        }

        const headerP = document.querySelector('.dashboard-header p');
        if (headerP) {
          headerP.insertAdjacentHTML(
            'beforeend',
            `<span class="badge bg-secondary ms-2">${escapeHtml(branch.toUpperCase())}</span>`
          );
        }

        container.innerHTML = modules.map((m) => `
          <div class="module-card">
            <div class="module-title">${escapeHtml(m)}</div>
            <div class="module-sub">Open from the navigation inside your study flow.</div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load modules:', e);
        container.innerHTML = `<div class="module-card">Failed to load your dashboard. Please login again.</div>`;
      }
    }

    function loadNavbar() {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.getElementById('navbar-container').innerHTML = h);
    }

    function loadFooter() {
      fetch('components/footer.html')
        .then(r => r.text())
        .then(h => document.getElementById('footer-container').innerHTML = h);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '<')
        .replaceAll('>', '>')
        .replaceAll('"', '"')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
