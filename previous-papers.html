<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Previous Papers - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { padding-top: 70px; }
    .paper-card { padding: 1.5rem; border-radius: 12px; background-color: var(--bg-secondary); border: 1px solid var(--border-color); margin-bottom: 1.5rem; transition: var(--transition); }
    .paper-card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-lg); }
    .paper-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .paper-year { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .paper-type { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: rgba(99, 102, 241, 0.2); color: var(--primary); }
    .paper-meta { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-light); margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main style="padding: 2rem;">
    <div class="container-fluid" style="max-width: 900px;">
      <div style="margin-bottom: 2rem;">
        <h1>📄 Previous Papers</h1>
        <p style="color: var(--text-light);">Access previous year ECET question papers and solutions</p>
      </div>

      <!-- Filter -->
      <div style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
        <select class="form-select" style="width: 200px;">
          <option selected>All Papers</option>
          <option>2023</option>
          <option>2022</option>
          <option>2021</option>
          <option>2020</option>
        </select>
        <button class="btn btn-outline-primary">Filter</button>
      </div>

      <!-- Papers List -->
      <div id="papersContainer">
        <div class="paper-card">
          <div class="paper-header">
            <div>
              <div class="paper-year">2023</div>
              <div style="font-size: 0.9rem; color: var(--text-light); margin-top: 0.25rem;">ECET Examination</div>
            </div>
            <span class="paper-type">PDF</span>
          </div>
          <div class="paper-meta">
            <span>📅 June 2023</span>
            <span>📄 100 Questions</span>
            <span>⏱️ 2.5 Hours</span>
          </div>
          <div style="display: flex; gap: 1rem;">
            <button class="btn btn-primary btn-sm">📥 Download</button>
            <button class="btn btn-outline-primary btn-sm">👁️ View</button>
            <button class="btn btn-outline-primary btn-sm">📝 Solutions</button>
          </div>
        </div>

        <div class="paper-card">
          <div class="paper-header">
            <div>
              <div class="paper-year">2022</div>
              <div style="font-size: 0.9rem; color: var(--text-light); margin-top: 0.25rem;">ECET Examination</div>
            </div>
            <span class="paper-type">PDF</span>
          </div>
          <div class="paper-meta">
            <span>📅 June 2022</span>
            <span>📄 100 Questions</span>
            <span>⏱️ 2.5 Hours</span>
          </div>
          <div style="display: flex; gap: 1rem;">
            <button class="btn btn-primary btn-sm">📥 Download</button>
            <button class="btn btn-outline-primary btn-sm">👁️ View</button>
            <button class="btn btn-outline-primary btn-sm">📝 Solutions</button>
          </div>
        </div>

        <div class="paper-card">
          <div class="paper-header">
            <div>
              <div class="paper-year">2021</div>
              <div style="font-size: 0.9rem; color: var(--text-light); margin-top: 0.25rem;">ECET Examination</div>
            </div>
            <span class="paper-type">PDF</span>
          </div>
          <div class="paper-meta">
            <span>📅 June 2021</span>
            <span>📄 100 Questions</span>
            <span>⏱️ 2.5 Hours</span>
          </div>
          <div style="display: flex; gap: 1rem;">
            <button class="btn btn-primary btn-sm">📥 Download</button>
            <button class="btn btn-outline-primary btn-sm">👁️ View</button>
            <button class="btn btn-outline-primary btn-sm">📝 Solutions</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="assets/js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.querySelector('#navbar-container').innerHTML = h);
      fetch('components/footer.html')
        .then(r => r.text())
        .then(h => document.querySelector('#footer-container').innerHTML = h);
    });
  </script>
</body>
</html>
