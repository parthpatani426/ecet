<style>
/* Sidebar Styles */
.sidebar {
  position: fixed;
  left: 0;
  top: 70px;
  bottom: 0;
  width: 280px;
  background-color: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  padding: 2rem 1rem;
  overflow-y: auto;
  transition: var(--transition);
  z-index: 100;
}

.sidebar-header {
  margin-bottom: 2rem;
}

.sidebar-header h3 {
  font-size: 1.2rem;
  margin: 0;
  color: var(--text-dark);
}

.branch-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 2rem;
}

.branch-item {
  padding: 1rem;
  border-radius: 8px;
  cursor: pointer;
  transition: var(--transition);
  background-color: var(--bg-tertiary);
  border: 2px solid transparent;
}

.branch-item:hover {
  background-color: var(--primary);
  color: white;
  border-color: var(--primary);
}

.branch-item.active {
  background-color: var(--primary);
  color: white;
  border-color: var(--primary-dark);
}

.branch-icon {
  font-size: 1.5rem;
  margin-right: 0.5rem;
}

.branch-name {
  font-weight: 600;
  font-size: 0.9rem;
}

.sidebar-section {
  margin-bottom: 2rem;
}

.sidebar-section h4 {
  font-size: 0.95rem;
  color: var(--text-light);
  text-transform: uppercase;
  margin-bottom: 1rem;
  letter-spacing: 0.5px;
}

.sidebar-section ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.sidebar-section li a {
  display: block;
  padding: 0.75rem 1rem;
  border-radius: 6px;
  color: var(--text-light);
  transition: var(--transition);
  border-left: 3px solid transparent;
}

.sidebar-section li a:hover {
  background-color: var(--bg-tertiary);
  color: var(--primary);
  border-left-color: var(--primary);
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 2rem;
  border-top: 1px solid var(--border-color);
}

/* Scrollbar */
.sidebar::-webkit-scrollbar {
  width: 6px;
}

.sidebar::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}

.sidebar::-webkit-scrollbar-thumb:hover {
  background: var(--text-light);
}

@media (max-width: 992px) {
  .sidebar {
    width: 240px;
  }
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: -280px;
    top: 0;
    bottom: 0;
    width: 280px;
    z-index: 998;
    height: 100vh;
    padding-top: 100px;
  }

  .sidebar.show {
    left: 0;
  }
}
</style>

<script>
// Render branches in sidebar
function renderSidebarBranches() {
  const branchList = document.querySelector('.branch-list');
  if (!branchList || !mockData) return;

  const selectedBranch = branchManager?.selectedBranch || localStorage.getItem('ecetx-selected-branch') || 'ece';
  
  branchList.innerHTML = mockData.branches.map(branch => `
    <div class="branch-item ${branch.id === selectedBranch ? 'active' : ''}" data-branch="${branch.id}">
      <span class="branch-icon">${branch.icon}</span>
      <span class="branch-name">${branch.name}</span>
    </div>
  `).join('');

  // Add click handlers
  branchList.querySelectorAll('.branch-item').forEach(item => {
    item.addEventListener('click', () => {
      const branchId = item.getAttribute('data-branch');
      branchManager?.setSelectedBranch(branchId);
      renderSidebarBranches();
    });
  });
}

// Initialize sidebar when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderSidebarBranches);
} else {
  renderSidebarBranches();
}
</script>
