<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subjects - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { padding-top: 70px; }
    .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem; padding: 2rem; }
    .subject-card { padding: 2rem; border-radius: 12px; background-color: var(--bg-secondary); border: 1px solid var(--border-color); cursor: pointer; transition: var(--transition); text-align: center; }
    .subject-card:hover { transform: translateY(-8px); box-shadow: var(--card-shadow-lg); }
    .subject-icon { font-size: 3rem; margin-bottom: 1rem; }
    .subject-name { font-weight: 700; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main style="padding: 2rem;">
    <div style="text-align: center; margin-bottom: 2rem; padding: 2rem;">
      <h1>📚 Subjects</h1>
      <p style="color: var(--text-light);">Explore all available subjects for your branch</p>
    </div>

    <div class="subjects-grid" id="subjectsGrid">
      <!-- Populated by JavaScript -->
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="assets/data/mockData.js"></script>
  <script src="assets/js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.querySelector('#navbar-container').innerHTML = h);
      fetch('components/footer.html')
        .then(r => r.text())
        .then(h => document.querySelector('#footer-container').innerHTML = h);
      renderSubjects();
    });

    function renderSubjects() {
      const grid = document.getElementById('subjectsGrid');
      const selectedBranch = localStorage.getItem('ecetx-selected-branch') || 'ece';
      const courses = mockData.courses.filter(c => c.branch === selectedBranch);

      grid.innerHTML = courses.map(course => `
        <div class="subject-card" onclick="viewTopic(${course.id})">
          <div class="subject-icon">${course.image}</div>
          <div class="subject-name">${course.title}</div>
          <div style="font-size: 0.85rem; color: var(--text-light); margin: 1rem 0;">${course.chapters} chapters</div>
          <a href="#" class="btn btn-primary btn-sm">View Topics →</a>
        </div>
      `).join('');
    }

    function viewTopic(courseId) {
      window.location.href = `topic-view.html?course=${courseId}`;
    }
  </script>
</body>
</html>
