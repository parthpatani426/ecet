<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Tests - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    body { padding-top: 70px; }
    .test-card { padding: 1.5rem; border-radius: 12px; background-color: var(--bg-secondary); border: 1px solid var(--border-color); margin-bottom: 1.5rem; transition: var(--transition); }
    .test-card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-lg); }
    .test-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem; }
    .test-title { font-size: 1.2rem; font-weight: 700; }
    .test-level { font-size: 0.85rem; font-weight: 600; }
    .test-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 1rem 0; }
    .stat-item { font-size: 0.9rem; }
    .stat-label { color: var(--text-light); font-size: 0.8rem; }
    .stat-value { color: var(--primary); font-weight: 700; }
    @media (max-width: 768px) { .test-stats { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main style="padding: 2rem;">
    <div class="container-fluid" style="max-width: 900px;">
      <div style="margin-bottom: 2rem;">
        <h1>📝 Mock Tests</h1>
        <p style="color: var(--text-light);">Full-length practice exams to assess your readiness</p>
      </div>

      <div style="margin-bottom: 2rem;">
        <label style="display: block; margin-bottom: 1rem; font-weight: 600;">Filter by Difficulty</label>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
          <button class="btn btn-outline-primary btn-sm active">All Tests</button>
          <button class="btn btn-outline-primary btn-sm">Beginner</button>
          <button class="btn btn-outline-primary btn-sm">Intermediate</button>
          <button class="btn btn-outline-primary btn-sm">Advanced</button>
        </div>
      </div>

      <div id="testsContainer">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/data/mockData.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadNavbar();
      loadFooter();
      renderTests();
    });

    function loadNavbar() {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.querySelector('#navbar-container').innerHTML = h);
    }

    function loadFooter() {
      fetch('components/footer.html')
        .then(r => r.text())
        .then(h => document.querySelector('#footer-container').innerHTML = h);
    }

    function renderTests() {
      const container = document.getElementById('testsContainer');
      const selectedBranch = localStorage.getItem('ecetx-selected-branch') || 'ece';
      const tests = mockData.mockTests.filter(t => t.branch === selectedBranch);

      container.innerHTML = tests.map(test => `
        <div class="test-card">
          <div class="test-header">
            <div>
              <div class="test-title">${test.title}</div>
              <span class="badge" style="margin-top: 0.5rem;" class="${test.level === 'Advanced' ? 'bg-danger' : test.level === 'Intermediate' ? 'bg-warning' : 'bg-info'}">${test.level}</span>
            </div>
          </div>
          <div class="test-stats">
            <div class="stat-item">
              <div class="stat-label">Questions</div>
              <div class="stat-value">${test.totalQuestions}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Duration</div>
              <div class="stat-value">${test.duration}m</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Avg Score</div>
              <div class="stat-value">${test.avgScore}/${test.totalMarks}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Attempts</div>
              <div class="stat-value">${test.attempts}</div>
            </div>
          </div>
          <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button class="btn btn-primary" onclick="startTest(${test.id})">Start Test</button>
            <button class="btn btn-outline-primary">View Solutions</button>
          </div>
        </div>
      `).join('');
    }

    function startTest(testId) {
      localStorage.setItem('current-test-id', testId);
      window.location.href = 'test-interface.html?id=' + testId;
    }
  </script>
</body>
</html>
