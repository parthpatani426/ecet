<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Interface - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { padding-top: 70px; }
    .test-wrapper { display: grid; grid-template-columns: 1fr 280px; gap: 2rem; padding: 2rem; }
    .question-panel { background-color: var(--bg-secondary); padding: 2rem; border-radius: 12px; border: 1px solid var(--border-color); }
    .question-text { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }
    .option { padding: 1rem; border-radius: 8px; border: 2px solid var(--border-color); margin-bottom: 0.75rem; cursor: pointer; transition: var(--transition); }
    .option:hover { border-color: var(--primary); background-color: rgba(99, 102, 241, 0.05); }
    .option.selected { border-color: var(--primary); background-color: rgba(99, 102, 241, 0.1); }
    .palette { background-color: var(--bg-secondary); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); }
    .question-palette { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .palette-btn { width: 40px; height: 40px; border-radius: 8px; border: 2px solid var(--border-color); background: var(--bg-light); cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.85rem; }
    .palette-btn:hover { border-color: var(--primary); }
    .palette-btn.attempted { background: rgba(99, 102, 241, 0.2); border-color: var(--primary); }
    .palette-btn.current { background: var(--primary); color: white; border-color: var(--primary); }
    .timer { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 1rem; }
    .progress-wrapper { margin: 1rem 0; }
    @media (max-width: 1200px) { .test-wrapper { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="test-wrapper">
    <!-- Question Panel -->
    <div>
      <div class="question-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h4 style="margin: 0;">Question <span id="currentQuestion">1</span>/100</h4>
          <button class="btn btn-sm btn-outline-secondary">Review</button>
        </div>

        <div class="question-text" id="questionText">
          What is the binary equivalent of decimal 25?
        </div>

        <div id="optionsContainer">
          <div class="option" onclick="selectOption(this, 0)">
            <div style="display: flex; align-items: center;">
              <input type="radio" name="answer" style="margin-right: 1rem;">
              <span>11001</span>
            </div>
          </div>
          <div class="option" onclick="selectOption(this, 1)">
            <div style="display: flex; align-items: center;">
              <input type="radio" name="answer" style="margin-right: 1rem;">
              <span>11010</span>
            </div>
          </div>
          <div class="option" onclick="selectOption(this, 2)">
            <div style="display: flex; align-items: center;">
              <input type="radio" name="answer" style="margin-right: 1rem;">
              <span>10011</span>
            </div>
          </div>
          <div class="option" onclick="selectOption(this, 3)">
            <div style="display: flex; align-items: center;">
              <input type="radio" name="answer" style="margin-right: 1rem;">
              <span>10101</span>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button class="btn btn-outline-primary" onclick="previousQuestion()">← Previous</button>
          <button class="btn btn-primary" onclick="nextQuestion()">Next →</button>
          <button class="btn btn-success" onclick="submitTest()">Submit Test</button>
        </div>
      </div>
    </div>

    <!-- Right Sidebar -->
    <div>
      <!-- Timer -->
      <div class="timer" id="timer">02:00:00</div>

      <!-- Progress -->
      <div style="margin-bottom: 1.5rem;">
        <div style="font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem;">Progress</div>
        <div class="progress">
          <div class="progress-bar" id="progressBar" style="width: 5%;"></div>
        </div>
        <div style="font-size: 0.8rem; color: var(--text-light); margin-top: 0.5rem;">5/100 attempted</div>
      </div>

      <!-- Question Palette -->
      <div class="palette">
        <div style="font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem;">Question Palette</div>
        <div class="question-palette" id="questionPalette">
          <!-- Populated by JavaScript -->
        </div>
      </div>

      <!-- Legend -->
      <div style="font-size: 0.8rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color); color: var(--text-light);">
        <div style="margin-bottom: 0.5rem;">
          <span style="display: inline-block; width: 12px; height: 12px; background: var(--primary); border-radius: 2px; margin-right: 0.5rem;"></span> Answered
        </div>
        <div style="margin-bottom: 0.5rem;">
          <span style="display: inline-block; width: 12px; height: 12px; background: var(--border-color); border-radius: 2px; margin-right: 0.5rem;"></span> Not Attempted
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/theme.js"></script>
  <script>
    let currentQuestion = 1;
    let answers = {};

    document.addEventListener('DOMContentLoaded', () => {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.querySelector('#navbar-container').innerHTML = h);
      
      renderQuestionPalette();
      startTimer();
    });

    function selectOption(element, index) {
      document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
      element.classList.add('selected');
      answers[currentQuestion] = index;
      updatePalette();
    }

    function nextQuestion() {
      if (currentQuestion < 100) {
        currentQuestion++;
        document.getElementById('currentQuestion').textContent = currentQuestion;
        updateProgressBar();
      }
    }

    function previousQuestion() {
      if (currentQuestion > 1) {
        currentQuestion--;
        document.getElementById('currentQuestion').textContent = currentQuestion;
        updateProgressBar();
      }
    }

    function updateProgressBar() {
      const progress = (Object.keys(answers).length / 100) * 100;
      document.getElementById('progressBar').style.width = progress + '%';
    }

    function renderQuestionPalette() {
      const palette = document.getElementById('questionPalette');
      let html = '';
      for (let i = 1; i <= 100; i++) {
        const classes = i === 1 ? 'current' : '';
        html += `<div class="palette-btn ${classes}" onclick="goToQuestion(${i})">${i}</div>`;
        if (i % 10 === 0) html += `<div style="width: 100%;"></div>`;
      }
      palette.innerHTML = html;
    }

    function updatePalette() {
      document.querySelectorAll('.palette-btn').forEach((btn, i) => {
        btn.classList.remove('current');
        if (i + 1 === currentQuestion) btn.classList.add('current');
        if (answers[i + 1] !== undefined) btn.classList.add('attempted');
      });
    }

    function goToQuestion(num) {
      currentQuestion = num;
      document.getElementById('currentQuestion').textContent = currentQuestion;
      updatePalette();
    }

    function startTimer() {
      let seconds = 7200; // 2 hours
      const timer = document.getElementById('timer');
      setInterval(() => {
        seconds--;
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        timer.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }, 1000);
    }

    function submitTest() {
      if (confirm('Submit test? You cannot change answers after submission.')) {
        alert('Test submitted successfully!');
        window.location.href = 'dashboard.html';
      }
    }
  </script>
</body>
</html>
