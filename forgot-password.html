<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    }
    .auth-container {
      width: 100%;
      max-width: 450px;
      padding: 2rem;
      background-color: var(--bg-light);
      border-radius: 16px;
      box-shadow: var(--card-shadow-xl);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .auth-header p {
      color: var(--text-light);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }
    .form-control {
      padding: 0.75rem 1rem;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-light);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="auth-container animate-fadeIn">
    <div class="auth-header">
      <h1>🔐 Reset Password</h1>
      <p>Enter your email to reset your password</p>
    </div>

    <form id="forgotForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="your@email.com" required>
      </div>


      <button type="submit" class="btn btn-primary w-100 btn-lg">Send Reset Code</button>
    </form>

    <div class="auth-footer">
      <p><a href="login.html">← Back to login</a></p>
    </div>
  </div>

  <script src="assets/js/theme.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/formValidator.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const forgotForm = document.getElementById('forgotForm');
      
      forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = forgotForm.querySelector('input[type="email"]').value.trim();

        if (!email) {
          ToastManager?.error('Please enter your email address');
          return;
        }

        const isValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        if (!isValidEmail) {
          ToastManager?.error('Please enter a valid email address');
          return;
        }

        // Disable submit button
        const submitBtn = forgotForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Sending...';

        try {
          await window.apiClient.forgotPassword(email);
          ToastManager?.success('✅ Reset code sent to your email');

          // Store email for reset page
          sessionStorage.setItem('reset_email', email);
          sessionStorage.removeItem('reset_branch');
          
          setTimeout(() => {
            window.location.href = 'password-reset.html';
          }, 1500);
        } catch (error) {
          console.error('❌ Password reset error:', error);
          ToastManager?.error(`❌ ${error.message}`);
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
    });
  </script>
</body>
</html>
