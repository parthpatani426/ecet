<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic View - ECETX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { padding-top: 70px; }
    .topic-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; padding: 2rem; }
    .topic-card { padding: 1.5rem; border-radius: 12px; background-color: var(--bg-secondary); border: 1px solid var(--border-color); cursor: pointer; transition: var(--transition); }
    .topic-card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-lg); }
    .topic-number { font-size: 0.85rem; color: var(--text-light); }
    .topic-title { font-weight: 700; margin: 0.5rem 0; }
    .topic-meta { font-size: 0.85rem; color: var(--text-light); margin-bottom: 1rem; }
    .topic-status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .topic-status.completed { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .topic-status.pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    @media (max-width: 1200px) { .topic-container { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 768px) { .topic-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main style="padding: 2rem;">
    <div style="margin-bottom: 2rem;">
      <a href="learn.html" style="color: var(--primary);">← Back to Courses</a>
      <h1 id="courseTitle" style="margin: 1rem 0;">Course Topics</h1>
      <p style="color: var(--text-light);">Explore all topics in this course</p>
    </div>

    <div class="topic-container" id="topicsContainer">
      <!-- Populated by JavaScript -->
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="assets/data/mockData.js"></script>
  <script src="assets/js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('components/navbar.html')
        .then(r => r.text())
        .then(h => document.querySelector('#navbar-container').innerHTML = h);
      fetch('components/footer.html')
        .then(r => r.text())
        .then(h => document.querySelector('#footer-container').innerHTML = h);
      renderTopics();
    });

    function renderTopics() {
      const params = new URLSearchParams(window.location.search);
      const courseId = parseInt(params.get('course')) || 1;
      const course = mockData.courses.find(c => c.id === courseId);
      const topics = mockData.topics.filter(t => t.courseId === courseId);

      document.getElementById('courseTitle').textContent = course.title;

      const container = document.getElementById('topicsContainer');
      container.innerHTML = topics.map(topic => `
        <div class="topic-card">
          <div class="topic-number">Chapter ${topic.chapter}</div>
          <div class="topic-title">${topic.title}</div>
          <div class="topic-meta">⏱️ ${topic.duration}</div>
          <div style="margin-bottom: 1rem;">
            <span class="topic-status ${topic.completed ? 'completed' : 'pending'}">
              ${topic.completed ? '✓ Completed' : 'In Progress'}
            </span>
          </div>
          <div style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 1rem;">
            ${topic.problems} Problems
          </div>
          <button class="btn btn-primary btn-sm w-100">Start Learning</button>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
